<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site.name }} | {{ site.role }}{% endblock %}</title>
    <meta name="description" content="Portfolio of {{ site.name }} — {{ site.role }} practitioner.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body data-theme="day">
    <div class="page-bg {% block page_bg_class %}{% endblock %}">
        <div class="nebula"></div>
        <div class="stars" id="stars"></div>
        <div class="celestial">
            <span class="ring"></span>
            <span class="crater" style="width:14px;height:14px;top:12px;left:14px;"></span>
            <span class="crater" style="width:9px;height:9px;top:34px;left:40px;"></span>
            <span class="crater" style="width:7px;height:7px;top:20px;left:48px;"></span>
        </div>
        <div class="sky-layer" id="cloudLayer"></div>
        <div class="sky-layer" id="shootingLayer"></div>
        <div class="mountains">
            <div class="mtn-far"></div>
            <div class="castle"></div>
            <div class="mtn-near"></div>
        </div>
    </div>
    <header>
        <nav>
            <a href="{{ url_for('home') }}#hero" class="logo"><span class="logo-badge">NK</span> NIDHI_</a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="{{ url_for('about') }}">About</a></li>
                <li><a href="{{ url_for('experience') }}">Quest Log</a></li>
                <li><a href="{{ url_for('projects') }}">Builds</a></li>
                <li><a href="{{ url_for('certifications') }}">Achievements</a></li>
                <li><a href="{{ url_for('contact') }}">Contact</a></li>
                <li><a class="resume-link" href="{{ site.resume_url or url_for('home') }}">Resume</a></li>
                <li><button class="theme-toggle" id="themeToggle" title="Toggle day/night">☀️</button></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>© 2026 {{ site.name.upper() }} — LEVEL: SECURITY EXPLORER</footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
